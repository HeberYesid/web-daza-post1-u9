<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar Sesión — Sistema de Seguridad</title>
    <meta name="description" content="Formulario de inicio de sesión del sistema de gestión universitaria"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
    <div class="container">
        <div class="card">

            <!-- Header con ícono -->
            <div class="card-header">
                <div class="icon">🔐</div>
                <h1>Iniciar Sesión</h1>
                <p>Ingresa tus credenciales para continuar</p>
            </div>

            <!-- Mensaje de error de autenticación -->
            <div th:if="${param.error}" class="alert alert-error">
                ⚠️ Correo o contraseña incorrectos.
            </div>

            <!-- Mensaje de sesión cerrada -->
            <div th:if="${param.logout}" class="alert alert-info">
                ✅ Sesión cerrada correctamente.
            </div>

            <!-- Mensaje de registro exitoso -->
            <div th:if="${param.registrado}" class="alert alert-success">
                ✅ Registro exitoso. Inicie sesión.
            </div>

            <!-- Spring Security procesa el POST a /login automáticamente -->
            <form th:action="@{/login}" method="post">

                <div class="form-group">
                    <label for="username">Correo electrónico</label>
                    <input type="email" id="username" name="username"
                           placeholder="usuario@correo.com" required autofocus/>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password"
                           placeholder="••••••••" required/>
                </div>

                <!-- Thymeleaf + Spring Security incluye el token CSRF automáticamente -->
                <button type="submit" class="btn btn-primary">Ingresar</button>
            </form>

            <div class="text-center mt-2">
                <a th:href="@{/registro}" class="link">¿No tiene cuenta? Registrarse</a>
            </div>
        </div>
    </div>
</body>
</html>
